version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pnp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pnp_academy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: pnp_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
